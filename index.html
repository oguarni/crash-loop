    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>crash-loop</title>

      content="A 2D infrastructure & automation puzzle — compose a cloud topology that survives simulated traffic within an error budget."

    <style>
      /* IBM Plex Mono, self-hosted from public/fonts so a live demo needs no
         network at all — no Google Fonts request to stall on venue wifi.
         Weights 400/500/600/700, latin + latin-ext subsets (the accents in the
         team credit live in latin). ui-monospace stays the fallback. */
      @font-face {
        font-family: "IBM Plex Mono";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("./fonts/ibm-plex-mono-400-latin.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "IBM Plex Mono";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("./fonts/ibm-plex-mono-400-latinext.woff2") format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }

        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {

        font-style: normal;
        font-weight: 500;
        font-display: swap;

      }

        font-weight: 700;
        font-display: swap;
        src: url("./fonts/ibm-plex-mono-700-latin.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;

      }
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b1020;
      }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        font-family: "IBM Plex Mono", ui-monospace, "Courier New", monospace;
      }
      /* Full-viewport stage that centres the board and reserves room for the hint
         line beneath it. --chrome is the vertical space the canvas must leave for
         the padding + gap + the (up to two-line) hint, so the board can never grow
         tall enough to overflow the viewport and clip the HUD / Run button. */
      #app {
        --chrome: 92px;
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(6px, 1.4vh, 12px);
        padding: clamp(8px, 2vh, 20px);
      }
      /* The board is a fixed 16:10 (960×600) surface. Scale it to the largest box
         that fits BOTH the available width and the available height, so it grows to
         fill big screens and shrinks on small ones — always preserving its aspect
         ratio, so the contents never squish, overlap, or clip. The input layer and
         the renderer both work in logical 960×600 units regardless of this size. */
      canvas {
        display: block;
        aspect-ratio: 960 / 600;
        width: min(100%, (100vh - var(--chrome)) * 960 / 600);
        width: min(100%, (100dvh - var(--chrome)) * 960 / 600);
        height: auto;
        box-shadow: 0 0 0 1px #3a3d45, 0 30px 80px rgba(0, 0, 0, 0.6);
      }
      .hint {
        color: #7cffb2;
        opacity: 0.55;
        font-size: clamp(10px, 1.4vw, 12px);
        letter-spacing: 0.02em;
        text-align: center;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="screen" width="960" height="600"></canvas>
      <div class="hint">
        crash-loop · place components, wire from ingress, then Run · Space
        pauses a run, M mutes, ? for help
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
